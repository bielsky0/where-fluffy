name: CI

on:
  push:
    # dev: local development branch — runs the same test/build gate as main, but the `deploy`
    # job below only fires for main (see its own `if`), so pushing here never touches the VPS.
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci

      # prisma.config.ts loads DATABASE_URL via prisma/config's env(), which throws if the var
      # is unset — `npm ci`'s own @prisma/client postinstall generate silently produces an
      # unconfigured stub client without this (no User/Pet/Prisma.sql/PrismaClientKnownRequestError
      # exports), which only surfaces two steps later as tsc errors. Placeholder value only:
      # generate reads the schema, never connects to a real database.
      - run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/fluffy_db"

      # Authoritative type-check gate — jest specs are transpiled by ts-jest in isolated mode
      # and don't type-check the app on their own (see CLAUDE.md).
      - run: npx tsc --noEmit

      - run: npm run test:unit

      # *.repository.integration.spec.ts files point testcontainers at the local image tag
      # "where-fluffy/postgres-ai:16" (infra/db/Dockerfile: postgis/postgis:16-3.4 + pgvector),
      # not a plain postgis/postgis tag — that image only exists because `docker compose build`
      # was run at some point on a dev machine. A fresh GitHub-hosted runner has no such local
      # image and no registry to pull "where-fluffy/postgres-ai" from, so testcontainers fails
      # with "pull access denied" unless we build it here first.
      - name: Build local Postgres+PostGIS+pgvector image for testcontainers
        run: docker build -t where-fluffy/postgres-ai:16 ../infra/db

      - run: npm run test:integration

      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run build

  deploy:
    needs: [backend, frontend]
    # Only push-to-main triggers a deploy — pull_request runs and push-to-dev (this same
    # workflow, triggered by the `on.push`/`on.pull_request` blocks above) must never touch the
    # prod host, and `needs` alone wouldn't stop that since those runs also complete
    # backend/frontend successfully.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # .env.production lives only on the VPS (gitignored, never in this repo or CI) — every
          # secret it holds (JWT_SECRET, CLOUDINARY_*, RESEND_API_KEY, POSTGRES_PASSWORD, ...)
          # stays off GitHub entirely. `exec -T`: no TTY on a non-interactive CI SSH session,
          # `docker compose exec` fails without it. `prisma migrate deploy` is safe to re-run on
          # every deploy (no-op when there's nothing new to apply) — see DEPLOY.md for why this
          # targets db:5432 directly rather than the pgbouncer:6432 DATABASE_URL the api
          # container itself runs with (Prisma's migration advisory locks under pooling).
          script: |
            set -e
            cd ~/where-fluffy
            git pull
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            set -a; source .env.production; set +a
            docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml \
              exec -T -e DATABASE_URL="postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@db:5432/$POSTGRES_DB" \
              api npx prisma migrate deploy
