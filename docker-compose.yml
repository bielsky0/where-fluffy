services:
  db:
    build:
      context: ./infra/db
    # Explicit tag (not just relying on compose's implicit build tag) so testcontainers-based
    # integration tests can reference this same pgvector-enabled image by name instead of the
    # bare "postgis/postgis:16-3.4" tag, which has no pgvector extension installed.
    image: where-fluffy/postgres-ai:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fluffy_db
    ports:
      - "5432:5432"
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    networks:
      - fluffy-net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: fluffy_db
    ports:
      - "6432:6432"
    depends_on:
      - db
    networks:
      - fluffy-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - fluffy-net

  api:
    build:
      context: ./src
    environment:
      DATABASE_URL: "postgresql://user:password@pgbouncer:6432/fluffy_db"
      REDIS_URL: "redis://redis:6379"
      OTEL_SERVICE_NAME: "where-fluffy-api"
      # Only this differs from the host-run `npm run dev` workflow's .env: inside the compose
      # network the collector is reachable at the "alloy" service name, not localhost.
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      NODE_ENV: production
      PORT: "3000"
      # No file-level default on purpose: auth.config.ts now refuses to start with NODE_ENV=production
      # if this equals the old hardcoded fallback (or is unset) — so this must come from the root
      # .env (gitignored) for local use, and from a real secret store for anything beyond a laptop.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set in the root .env}"
      # All have matching Zod defaults in shared/config/location.config.ts (same Warsaw
      # coordinates) — set explicitly here for parity/visibility, not because they differ.
      FALLBACK_LOCATION_LAT: "52.2297"
      FALLBACK_LOCATION_LNG: "21.0122"
      FALLBACK_LOCATION_CITY: "Warszawa"
      GEOIP_DB_PATH: "./geoip/GeoLite2-City.mmdb"
      # OAuth (Google/Facebook) — placeholders; replace with real registered app credentials
      # before this container needs to serve a real login flow. See src/.env.example and
      # shared/config/oauth.config.ts for what each does, including the per-provider kill switch.
      FRONTEND_URL: "http://localhost:5173"
      # This stack sets NODE_ENV=production above but still runs on a laptop with a plain-http
      # Vite dev server as its frontend — oauth.config.ts's FRONTEND_URL validator would otherwise
      # refuse to start, since it requires https:// whenever NODE_ENV=production. A real production
      # deploy should NOT set this (see docker-compose.prod.yml).
      ALLOW_INSECURE_ORIGIN: "true"
      BACKEND_PUBLIC_URL: "http://localhost:3000"
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_OAUTH_ENABLED: "true"
      FACEBOOK_APP_ID: ""
      FACEBOOK_APP_SECRET: ""
      FACEBOOK_OAUTH_ENABLED: "true"
      # NODE_ENV above is "production", so requestOtp (auth.service.ts) will attempt a real send
      # via this key rather than logging/echoing devCode. Pulled from a root-level .env (gitignored,
      # separate from src/.env which only the host-run `npm run dev` workflow reads) via Compose's
      # own ${VAR} interpolation, so the real key is never hardcoded/committed here.
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_FROM_ADDRESS: "Where's Fluffy <onboarding@resend.dev>"
      # No file-level default: cloudinary.config.ts refuses to start without these (same
      # fail-fast pattern as JWT_SECRET above). Pulled from the root .env, same as RESEND_API_KEY.
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME:?CLOUDINARY_CLOUD_NAME must be set in the root .env}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY:?CLOUDINARY_API_KEY must be set in the root .env}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET:?CLOUDINARY_API_SECRET must be set in the root .env}"
      # Vector AI & Embedding Pipeline — real self-hosted model (verified working end-to-end
      # against ai-worker/ai-model, see search.repository.ts's <=> query). ai-model is
      # deliberately NOT in this service's depends_on: semantic search must degrade (503, see
      # search.service.ts) rather than block api startup on the model container being healthy.
      EMBEDDING_SERVICE_URL: "http://ai-model:11434"
      EMBEDDING_PROVIDER: "local"
    ports:
      - "3000:3000" # alternative to running `npm run dev` on the host — don't run both at once,
                     # they'd fight over this same host port.
    depends_on:
      - db
      - pgbouncer
      - redis
      - alloy
    networks:
      - fluffy-net

  # Vector AI & Embedding Pipeline — self-hosted embedding model (Ollama + nomic-embed-text,
  # 768 dims), zero paid third-party AI APIs. Model is baked into the image at build time
  # (infra/ai-model/Dockerfile), not pulled at container startup, so first boot is immediately
  # ready to serve embeddings.
  ai-model:
    build:
      context: ./infra/ai-model
    image: where-fluffy/ai-model:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    networks:
      - fluffy-net

  # Second entrypoint of the same api image/codebase (src/ai-worker/main.ts), not a separate
  # package — only the `command:` differs from the api service above. Consumes the
  # EMBED_PET_DATA BullMQ queue and writes Pet.embedding via the real self-hosted model.
  ai-worker:
    build:
      context: ./src
    command: ["node", "dist/ai-worker/main.js"]
    environment:
      DATABASE_URL: "postgresql://user:password@pgbouncer:6432/fluffy_db"
      REDIS_URL: "redis://redis:6379"
      OTEL_SERVICE_NAME: "where-fluffy-ai-worker"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      NODE_ENV: production
      EMBEDDING_SERVICE_URL: "http://ai-model:11434"
      EMBEDDING_PROVIDER: "local"
      AI_WORKER_CONCURRENCY: "2"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
      ai-model:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - fluffy-net

  # Prisma Studio — on-demand DB admin GUI, NOT started by a bare `docker compose up -d`.
  # No built-in auth: loopback-only port binding + an SSH tunnel is the entire auth boundary.
  # Start:  docker compose --profile admin up -d prisma-studio
  # Stop:   docker compose --profile admin down prisma-studio
  prisma-studio:
    build:
      context: ./src
      target: builder   # builder stage has the `prisma` CLI (devDependency), generated client,
                         # schema.prisma, and openssl; `runtime` strips devDependencies and has
                         # no `prisma` binary to run `prisma studio` with.
    # Compose interpolates every service's `environment:` block at config-parse time regardless
    # of profiles — a `${DATABASE_URL:?...}` here would break the base `docker compose up -d`
    # for everyone, even though this service itself is profile-gated. So the file-level default
    # is empty, and the required-var check instead runs inside the container at start time, only
    # when someone actually brings this service up via --profile admin.
    command: >
      sh -c '
        if [ -z "$$DATABASE_URL" ]; then
          echo "DATABASE_URL is required to start prisma-studio — set it in the root .env" >&2;
          exit 1;
        fi;
        exec npx prisma studio --hostname 0.0.0.0 --port 5555
      '
    environment:
      # No file-level default — set the real value in the root .env (gitignored):
      #   local testing: DATABASE_URL="postgresql://user:password@db:5432/fluffy_db"
      #   real prod use: the deployment host's own real DB URL — never hardcode/commit it here.
      DATABASE_URL: "${DATABASE_URL:-}"
      # Disables Prisma's telemetry/update-check ping on every `studio` invocation — this may
      # run against a production host.
      CHECKPOINT_DISABLE: "1"
    ports:
      # Loopback-only — unlike every other service's ports in this file (all bare "host:container",
      # which Docker publishes to 0.0.0.0). Only reachable from the Docker host itself; remote
      # developers reach it via an SSH tunnel.
      - "127.0.0.1:5555:5555"
    profiles:
      - admin
    networks:
      - fluffy-net

  # ---------------------------------------------------------------------------
  # Observability (LGTM + Alloy). Alloy is the single collector every signal
  # flows through: OTLP traces/metrics from the app land on 4317/4318, Docker
  # container logs are scraped straight from the daemon — nothing talks to
  # Loki/Tempo/Prometheus directly except Alloy and Grafana's queries.
  # ---------------------------------------------------------------------------

  alloy:
    image: grafana/alloy:latest
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "4317:4317"   # OTLP gRPC (traces + metrics) — app's OTEL_EXPORTER_OTLP_ENDPOINT points here
      - "4318:4318"   # OTLP HTTP, same receiver
      - "12345:12345" # Alloy UI + its own /metrics (component health, scraped by Prometheus below)
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - fluffy-net

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - fluffy-net

  tempo:
    image: grafana/tempo:2.7.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # Tempo query API — used by Grafana's Tempo datasource
    depends_on:
      - prometheus
    networks:
      - fluffy-net

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Required so Alloy (and Tempo's metrics-generator) can push metrics via
      # remote_write instead of Prometheus having to scrape them.
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fluffy-net

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      # Dev-only convenience — do not ship a fixed admin password like this to production.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceToMetrics
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000" # host 3000 is already the app itself (see main.ts)
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - fluffy-net

volumes:
  pgdata:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:
  alloy-data:
  ollama-data:

networks:
  fluffy-net:
    driver: bridge
