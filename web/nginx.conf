# Static SPA serving only — routing /api/v1 and /socket.io to the `api` service is the
# top-level reverse proxy's job (see docker-compose.prod.yml's `proxy` service), not this
# container's. Keeping that in one place avoids two independent, easy-to-drift proxy configs.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing (React Router) — any path that isn't a real static file falls back
    # to index.html so the SPA's own router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for hashed Vite build assets; index.html itself is excluded by the
    # location block above matching it directly via try_files, so it's always revalidated.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
