apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      # "Logs to Trace" — a trace_id inside a log line becomes a clickable link into Tempo.
      # This regex matches the field logger.ts's pino mixin() injects into every JSON log line:
      # {"trace_id":"<32 hex chars>", ...}. Adjust if you rename that field.
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"([0-9a-f]+)"'
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "View Trace"

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    jsonData:
      # "Trace to Logs" — jumping from a span to the logs emitted while that span was active,
      # filtered by trace_id and a time window around the span.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        filterByTraceID: true
        filterBySpanID: false
        tags: [{ key: "service.name", value: "container" }]

      # "Trace to Metrics" — jumping from a span to the RED metrics Tempo's metrics-generator
      # derived from it (see infra/tempo/tempo.yaml's metrics_generator: service-graphs +
      # span-metrics, remote_written into Prometheus).
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        tags: [{ key: "service.name", value: "service" }]
        queries:
          - name: "Request rate"
            query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))'
          - name: "p95 latency"
            query: 'histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])) by (le))'

      serviceMap:
        datasourceUid: prometheus

      search:
        hide: false

      nodeGraph:
        enabled: true

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    jsonData:
      httpMethod: POST
      # "Metrics to Trace" — a Prometheus exemplar (recorded alongside traces_spanmetrics_*
      # by Tempo's metrics-generator, tempo.yaml's send_exemplars: true) links back into Tempo.
      exemplarTraceIdDestinations:
        - datasourceUid: tempo
          name: trace_id
